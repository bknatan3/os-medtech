services:
  - type: web
    name: os-medtech-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @os-medtech/backend db:generate && pnpm --filter @os-medtech/backend build && pnpm --filter @os-medtech/backend db:deploy
    startCommand: corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm --filter @os-medtech/backend start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3333"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: os-medtech-db
          property: connectionString

databases:
  - name: os-medtech-db
    databaseName: os_medtech
    user: os_medtech
    plan: free
