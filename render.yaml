services:
  - type: web
    name: os-medtech-api
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm install && pnpm db:generate && pnpm build
    startCommand: corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm db:deploy && pnpm db:seed:if-empty && pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: os-medtech-db
          property: connectionString

databases:
  - name: os-medtech-db
    databaseName: os_medtech
    user: os_medtech
    plan: free
